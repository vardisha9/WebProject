<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HaHamama - Catalog</title>

    

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="homeStyle.css" />
    <link rel="stylesheet" href="catalogStyle.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
<!-- Navigation bar -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm">
    <div class="container-fluid">

    <!-- Site name -->
    <a class="navbar-brand" href="home.html">
    <img src="images/logo.png" alt="HaHamama Logo" class="site-logo">
</a>

    <!-- Mobile menu button -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
        <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navigation actions -->
    <div class="collapse navbar-collapse" id="navbarContent">
        <div class="navbar-nav ms-auto align-items-lg-center gap-3">

        <a href="catalog.html" class="btn btn-success start-shopping-btn">
          Start Shopping
        </a>

        <a href="cart.html" class="nav-link nav-icon-link" title="Cart">
          🛒 Cart <span id="cart-count">(0)</span>
        </a>

        <a href="login.html" class="nav-link nav-icon-link" id="nav-sign-in" title="Login">
          👤 Sign In
        </a>

        <span class="nav-link nav-icon-link hidden" id="nav-user-info">
          <span id="nav-user-name" title="Click to edit your profile"></span>
          <button id="nav-logout-btn" class="btn btn-outline-success btn-sm ms-2">Logout</button>
        </span>

      </div>
    </div>

  </div>
</nav>
  <!-- Main catalog content -->
<main id="catalog-main-container">

  <!-- Catalog header -->
    <section id="catalog-header">
    <h1>Browse Our Catalog</h1>
    <p>Discover fresh produce directly from local farmers.</p>
    </section>

  <!-- Search section -->
    <section id="search-section">
        <input type="text" id="search-input" placeholder="Search for products...">
    </section>

  <!-- Category filter --><section id="filter-section">

  <a href="#products-section" class="filter-btn">All</a>

  <a href="#vegetables" class="filter-btn">Vegetables</a>

  <a href="#fruits" class="filter-btn">Fruits</a>

  <a href="#herbs" class="filter-btn">Herbs</a>

  <a href="#seasonal-specials" class="filter-btn">Seasonal Specials</a>

</section>
  <!-- Products section - product cards are loaded dynamically from the server via Catalog.js -->
  <section id="products-section">

    <!-- Vegetables -->
    <section id="vegetables">
        <h2>Vegetables</h2>
        <div class="products-grid" data-category="vegetables"></div>
    </section>

    <!-- Fruits -->
    <section id="fruits">
      <h2>Fruits</h2>
      <div class="products-grid" data-category="fruits"></div>
    </section>

    <!-- Herbs -->
    <section id="herbs">
      <h2>Herbs</h2>
      <div class="products-grid" data-category="herbs"></div>
    </section>

    <!-- Seasonal Specials -->
    <section id="seasonal-specials">
      <h2>Seasonal Specials</h2>
      <div class="products-grid" data-category="seasonal-specials"></div>
    </section>

  </section>

</main>
 <!-- Footer -->
    <footer class="text-center">
        <div id="footer-div" class="text-center p-3 text-white">
            <p>© 2026 HaHamama. All rights reserved.</p> 
            <p>Contact us: hahamama.service@gmail.com</p>
        </div>
     </footer>
<script src="catalog.js"></script>

<!-- Toast notification for cart feedback -->
<div id="cart-toast"></div>
</body>
</html>
