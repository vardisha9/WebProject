<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HaHamama - Login</title>
  <!-- Stylesheets -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="loginStyle.css">
  <link rel="stylesheet" href="homeStyle.css" />
  <!-- Bootstrap JavaScript -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
</head>
  
<body>
 
  <!-- Navigation bar -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm">
  <div class="container-fluid">

    <!-- Site name -->
   <a class="navbar-brand" href="home.html">
  <img src="images/logo.png" alt="HaHamama Logo" class="site-logo">
</a>

    <!-- Mobile menu button -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navigation actions -->
    <div class="collapse navbar-collapse" id="navbarContent">
      <div class="navbar-nav ms-auto align-items-lg-center gap-3">

        <a href="catalog.html" class="btn btn-success start-shopping-btn">
          Start Shopping
        </a>

        <a href="cart.html" class="nav-link nav-icon-link" title="Cart">
          🛒 Cart <span id="cart-count">(0)</span>
        </a>

        <a href="login.html" class="nav-link nav-icon-link" id="nav-sign-in" title="Login">
          👤 Sign In
        </a>

        <span class="nav-link nav-icon-link hidden" id="nav-user-info">
          <span id="nav-user-name" title="Click to edit your profile"></span>
          <button id="nav-logout-btn" class="btn btn-outline-success btn-sm ms-2">Logout</button>
        </span>

      </div>
    </div>

  </div>
</nav>

  <h1 id="page-title">Sign In</h1>

<div class="login-container">

  <!-- LOGIN -->
  <form class="form-box" id="login-form">
    <h2>Sign In</h2>
    <input type="email" id="login-email" placeholder="Email">
    <input type="password" id="login-password" placeholder="Password">
    <button type="submit">Sign In</button>

    <p class="register-link-text">
      Still not registered?
      <button type="button" id="show-register-btn">Create an account</button>
    </p>
  </form>

  <!-- REGISTER -->
  <form class="form-box hidden" id="register-form">
    <h2>Register</h2>
    <input type="text" id="first-name" placeholder="First Name">
    <input type="text" id="last-name" placeholder="Last Name">
    <input type="email" id="register-email" placeholder="Email">
    <input type="text" id="phone" placeholder="Phone">
    <input type="text" id="address" placeholder="e.g. Avraham Avinu 1, Entrance D, Floor 3, Apt 20">
    <input type="password" id="register-password" placeholder="Password">
    <button type="submit">Create Account</button>
  </form>

  <!-- EDIT PROFILE - only shown to a logged-in user who clicked "Hello, [name]" -->
  <form class="form-box hidden" id="edit-profile-form">
    <h2>Edit Profile</h2>
    <input type="text" id="edit-first-name" placeholder="First Name">
    <input type="text" id="edit-last-name" placeholder="Last Name">
    <input type="email" id="edit-email" placeholder="Email">
    <input type="text" id="edit-phone" placeholder="Phone">
    <input type="text" id="edit-address" placeholder="e.g. Avraham Avinu 1, Entrance D, Floor 3, Apt 20, Beer Sheva">
    <button type="submit">Save Changes</button>
  </form>

</div>

  <!-- Footer -->
  <footer class="text-center">
    <div id="footer-div" class="text-center p-3 text-white">
     <p>© 2026 HaHamama. All rights reserved.</p> 
     <p>Contact us: hahamama.service@gmail.com</p>
    </div>
  </footer>
  <script src="login.js"></script>
</body>
</html>
