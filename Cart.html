<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HaHamama - Cart</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="cartStyle.css">
  <link rel="stylesheet" href="homeStyle.css">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
  <!-- Navigation bar -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm">
  <div class="container-fluid">

    <!-- Site name -->
   <a class="navbar-brand" href="home.html">
  <img src="images/logo.png" alt="HaHamama Logo" class="site-logo">
</a>

    <!-- Mobile menu button -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navigation actions -->
    <div class="collapse navbar-collapse" id="navbarContent">
      <div class="navbar-nav ms-auto align-items-lg-center gap-3">

        <a href="catalog.html" class="btn btn-success start-shopping-btn">
          Start Shopping
        </a>

        <a href="cart.html" class="nav-link nav-icon-link" title="Cart">
          🛒 Cart <span id="cart-count">(0)</span>
        </a>

        <a href="login.html" class="nav-link nav-icon-link" title="Login">
          👤 Sign In
        </a>

      </div>
    </div>

  </div>
</nav>

  <h1>Your Shopping Cart</h1>

  <div id="cart-items"></div>

  <h2>Total: ₪<span id="cart-total">0</span></h2>

<div class="confirm-order-container">
  <button id="confirm-order-btn">Confirm Order</button>
</div>

  <!-- Footer -->
  <footer class="text-center">
    <div id="footer-div" class="text-center p-3 text-white">
     <p>© 2026 HaHamama. All rights reserved.</p> 
     <p>Contact us: hahamama.service@gmail.com</p>
    </div>
  </footer>
  <script src="Cart.js"></script>
</body>
</html>
